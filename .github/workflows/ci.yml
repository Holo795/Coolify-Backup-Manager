name: CI

# Runs the same checks CONTRIBUTING.md asks contributors to run locally, on every
# pull request to main (and on pushes to main). Required to pass before merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    # `prisma generate` (run by the controller's postinstall) loads prisma.config
    # which requires DATABASE_URL to resolve. Generation is offline and never
    # connects, so a placeholder is enough to satisfy config loading in CI.
    env:
      DATABASE_URL: postgresql://cbm:cbm@localhost:5432/cbm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`) to match the Dockerfiles and tolerate the
      # platform-specific optional native deps some lint tooling pulls in.
      # postinstall generates the Prisma client (needed for the controller type-check).
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint (all packages)
        run: npm run lint

      # Builds @cbm/shared first, then type-checks the agent and controller.
      - name: Type-check (all packages)
        run: npm run typecheck

      - name: Unit tests (shared + agent + controller)
        run: npm test
