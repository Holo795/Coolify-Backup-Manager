name: Build & publish images

# Builds the agent and controller images and pushes them to GitHub Container
# Registry (ghcr.io/<owner>/cbm-agent and cbm-controller).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: cbm-agent
            dockerfile: Dockerfile.agent
          - name: cbm-controller
            dockerfile: Dockerfile.controller
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image ref
        id: ref
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.ref.outputs.image }}:latest
            ${{ steps.ref.outputs.image }}:${{ github.sha }}
